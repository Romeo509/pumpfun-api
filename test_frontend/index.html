<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PumpFun API Test Frontend</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>🚀 PumpFun API</h2>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li class="nav-item active" data-section="create-coin">
                        <a href="#" class="nav-link">
                            <span class="nav-icon">🪙</span>
                            <span class="nav-text">Create Coin</span>
                        </a>
                    </li>
                    <li class="nav-item" data-section="buy-coin">
                        <a href="#" class="nav-link">
                            <span class="nav-icon">💳</span>
                            <span class="nav-text">Buy Coin</span>
                        </a>
                    </li>
                    <!-- Additional menu items can be added here later -->
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="content-wrapper">
                <header>
                    <h1>Create New Coin</h1>
                    <p>Fill in the details to create your token</p>
                </header>

                <div class="content-area">
                    <section id="create-coin-section" class="active-section">
                        <form id="createCoinForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="name">Token Name *</label>
                                    <input type="text" id="name" name="name" required placeholder="e.g. MyAwesomeToken">
                                </div>

                                <div class="form-group">
                                    <label for="symbol">Token Symbol *</label>
                                    <input type="text" id="symbol" name="symbol" required placeholder="e.g. MAT">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="description">Description</label>
                                <textarea id="description" name="description" placeholder="Describe your token..."></textarea>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="twitter">Twitter URL</label>
                                    <input type="url" id="twitter" name="twitter" placeholder="https://x.com/username">
                                </div>

                                <div class="form-group">
                                    <label for="telegram">Telegram URL</label>
                                    <input type="url" id="telegram" name="telegram" placeholder="https://t.me/groupname">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="website">Website URL</label>
                                    <input type="url" id="website" name="website" placeholder="https://example.com">
                                </div>

                                <div class="form-group">
                                    <label for="amount">Dev Buy Amount (SOL) *</label>
                                    <input type="number" id="amount" name="amount" step="0.001" required placeholder="0.04" min="0">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="image">Upload Image *</label>
                                <div class="file-upload">
                                    <input type="file" id="image" name="image" accept="image/*" required>
                                    <label for="image" class="file-upload-label">
                                        <span class="file-upload-text">Choose Image</span>
                                        <span class="file-upload-icon">📁</span>
                                    </label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="privateKey">Private Key (Base58) *</label>
                                <input type="password" id="privateKey" name="privateKey" required placeholder="Enter your private key">
                            </div>

                            <button type="submit" class="submit-btn">
                                <span class="btn-text">Create Coin</span>
                                <span class="btn-icon">✨</span>
                            </button>
                        </form>

                        <div id="responseBox" class="response-box">
                            <h3>API Response</h3>
                            <pre id="responseContent">Response will appear here...</pre>
                        </div>
                    </section>

                    <section id="buy-coin-section" class="inactive-section">
                        <h2>Buy Coin</h2>
                        <p>Buy existing tokens on Pump.fun</p>
                        
                        <form id="buyCoinForm">
                            <div class="form-group">
                                <label for="mintAddress">Token Mint Address *</label>
                                <input type="text" id="mintAddress" name="mintAddress" required placeholder="Enter token mint address">
                            </div>

                            <div class="form-group">
                                <label for="buyPrivateKey">Private Key (Base58) *</label>
                                <input type="password" id="buyPrivateKey" name="buyPrivateKey" required placeholder="Enter your private key">
                            </div>

                            <div class="form-group">
                                <label for="buyAmount">Amount (SOL) *</label>
                                <input type="number" id="buyAmount" name="buyAmount" step="0.001" required placeholder="0.05" min="0">
                            </div>

                            <button type="submit" class="submit-btn">
                                <span class="btn-text">Buy Coin</span>
                                <span class="btn-icon">💸</span>
                            </button>
                        </form>

                        <div id="buyResponseBox" class="response-box">
                            <h3>API Response</h3>
                            <pre id="buyResponseContent">Response will appear here...</pre>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
